<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexusAI \u2014 Multi-Model Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  /* \u2500\u2500\u2500 RESET & VARS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07090d;
    --surface:   #0e1219;
    --surface2:  #141b25;
    --border:    rgba(0, 220, 200, 0.12);
    --border2:   rgba(0, 220, 200, 0.06);
    --teal:      #00dcc8;
    --teal-dim:  rgba(0, 220, 200, 0.18);
    --teal-glow: rgba(0, 220, 200, 0.06);
    --amber:     #f0a040;
    --red:       #e05555;
    --green:     #50d890;
    --text:      #dde8f4;
    --muted:     #5a7090;
    --muted2:    #3a4f65;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Fraunces', Georgia, serif;
    --sidebar-w: 300px;
    --radius:    14px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

  /* \u2500\u2500\u2500 LAYOUT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #app {
    display: flex;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background */
  #app::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(0,220,200,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 85% 80%, rgba(240,160,64,0.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* \u2500\u2500\u2500 SIDEBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
    position: relative;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 24px 20px 18px;
    border-bottom: 1px solid var(--border2);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .logo-mark {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--teal) 0%, #0090a0 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 16px;
    color: #07090d;
    box-shadow: 0 0 20px rgba(0,220,200,0.3);
  }

  .logo-text {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .logo-text span { color: var(--teal); }

  .model-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    opacity: 0.35; pointer-events: none;
  }
  #model-search {
    width: 100%;
    padding: 8px 12px 8px 34px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  #model-search:focus { border-color: var(--teal); }
  #model-search::placeholder { color: var(--muted2); }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border2);
  }

  .filter-tab {
    flex: 1;
    padding: 6px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .filter-tab.active {
    background: var(--teal-dim);
    border-color: var(--teal);
    color: var(--teal);
  }

  .filter-tab:hover:not(.active) {
    border-color: var(--muted2);
    color: var(--text);
  }

  /* Model list */
  #model-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--muted2) transparent;
  }

  .model-group-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted2);
    padding: 10px 10px 6px;
  }

  .model-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }

  .model-item:hover {
    background: var(--teal-glow);
    border-color: var(--border);
  }

  .model-item.selected {
    background: var(--teal-dim);
    border-color: var(--teal);
  }

  .model-item-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    background: var(--surface2);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .model-item-info { flex: 1; min-width: 0; }

  .model-item-name {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .model-item.selected .model-item-name { color: var(--teal); }

  .model-item-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 3px;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    font-weight: 500;
  }

  .badge-free { background: rgba(80,216,144,0.15); color: var(--green); border: 1px solid rgba(80,216,144,0.3); }
  .badge-paid { background: rgba(240,160,64,0.12); color: var(--amber); border: 1px solid rgba(240,160,64,0.25); }
  .badge-ctx  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border2);
  }

  .new-chat-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--teal);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    letter-spacing: 0.05em;
  }

  .new-chat-btn:hover {
    background: var(--teal-dim);
    border-color: var(--teal);
  }

  /* \u2500\u2500\u2500 MAIN CHAT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* Top bar */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border2);
    background: rgba(14,18,25,0.8);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }

  .active-model-info {
    display: flex; align-items: center; gap: 10px;
  }

  .active-model-icon {
    width: 32px; height: 32px; border-radius: 9px;
    background: var(--teal-dim);
    border: 1px solid var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .active-model-name {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .active-model-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    letter-spacing: 0.05em;
  }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid rgba(80,216,144,0.25);
    background: rgba(80,216,144,0.07);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.08em;
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  /* Mobile hamburger */
  #menu-btn {
    display: none;
    background: none; border: none;
    color: var(--teal); cursor: pointer; padding: 4px;
  }

  /* \u2500\u2500\u2500 MESSAGES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--muted2) transparent;
  }

  /* Welcome */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 20px;
    text-align: center;
    animation: riseIn 0.6s ease forwards;
  }

  .welcome-orb {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--teal), #0090a0, #004060, var(--teal));
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: spin 8s linear infinite;
    box-shadow: 0 0 40px rgba(0,220,200,0.2);
  }

  .welcome-orb::after {
    content: '\u2726';
    position: absolute;
    font-size: 24px;
    color: var(--bg);
    animation: spin 8s linear infinite reverse;
  }

  .welcome-title {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .welcome-title span { color: var(--teal); }

  .welcome-sub {
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--muted);
    max-width: 380px;
    line-height: 1.7;
    font-style: italic;
  }

  .starter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 500px;
    width: 100%;
    margin-top: 8px;
  }

  .starter-card {
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .starter-card:hover {
    border-color: var(--teal);
    background: var(--teal-glow);
    transform: translateY(-2px);
  }

  .starter-card-icon { font-size: 18px; margin-bottom: 6px; }

  .starter-card-text {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text);
    line-height: 1.4;
  }

  /* Message bubbles */
  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 820px;
    animation: riseIn 0.3s ease forwards;
  }

  .message.user { align-items: flex-end; align-self: flex-end; }
  .message.assistant { align-items: flex-start; align-self: flex-start; }

  .msg-role {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .message.user .msg-role { color: var(--teal); padding-right: 4px; }
  .message.assistant .msg-role { color: var(--muted); padding-left: 4px; }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-family: var(--font-body);
    font-size: 15.5px;
    line-height: 1.75;
    max-width: 100%;
  }

  .message.user .msg-bubble {
    background: linear-gradient(135deg, rgba(0,220,200,0.18) 0%, rgba(0,140,160,0.18) 100%);
    border: 1px solid rgba(0,220,200,0.25);
    border-radius: 16px 16px 4px 16px;
    color: var(--text);
  }

  .message.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    color: var(--text);
  }

  .msg-bubble p { margin-bottom: 10px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--teal);
  }
  .msg-bubble pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
  }
  .msg-bubble pre code {
    background: none; padding: 0;
    font-size: 13px; color: var(--text);
  }
  .msg-bubble strong { color: var(--teal); font-weight: 600; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 8px 0; }
  .msg-bubble li { margin-bottom: 4px; }

  /* Typing indicator */
  .typing-bubble {
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 16px 4px;
    display: flex; gap: 5px; align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--teal);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  /* Model tag on response */
  .msg-model-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted2);
    padding-left: 4px;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* \u2500\u2500\u2500 INPUT AREA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #input-area {
    padding: 16px 28px 22px;
    background: rgba(14,18,25,0.9);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border2);
    flex-shrink: 0;
  }

  .input-shell {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .input-shell:focus-within {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(0,220,200,0.08);
  }

  #user-input {
    width: 100%;
    background: transparent;
    border: none; outline: none;
    resize: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    padding: 14px 18px 10px;
    min-height: 54px;
    max-height: 200px;
    caret-color: var(--teal);
  }

  #user-input::placeholder { color: var(--muted2); font-style: italic; }

  .input-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px 12px;
  }

  .input-bar-left {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted2);
    letter-spacing: 0.06em;
  }

  .input-bar-right { display: flex; align-items: center; gap: 8px; }

  .char-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted2);
  }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--teal) 0%, #008898 100%);
    color: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,220,200,0.25);
    flex-shrink: 0;
  }

  #send-btn:hover:not(:disabled) {
    transform: scale(1.1);
    box-shadow: 0 4px 20px rgba(0,220,200,0.4);
  }

  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .footer-info {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--muted2);
    margin-top: 10px;
    letter-spacing: 0.06em;
  }

  /* \u2500\u2500\u2500 ERROR TOAST \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(224,85,85,0.15);
    border: 1px solid rgba(224,85,85,0.4);
    color: var(--red);
    padding: 10px 20px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 400px;
    text-align: center;
  }

  #toast.show { opacity: 1; }

  /* Loading spinner for model list */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 30px auto;
  }

  /* \u2500\u2500\u2500 ANIMATIONS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40%           { transform: scale(1.1); opacity: 1; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* \u2500\u2500\u2500 MOBILE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  @media (max-width: 700px) {
    :root { --sidebar-w: 280px; }

    #sidebar {
      position: fixed;
      top: 0; left: 0; height: 100%;
      transform: translateX(-100%);
      z-index: 50;
      transition: transform 0.3s ease;
      box-shadow: 4px 0 30px rgba(0,0,0,0.5);
    }

    #sidebar.open { transform: translateX(0); }

    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 40;
    }
    #overlay.show { display: block; }

    #menu-btn { display: flex; }

    #messages { padding: 20px 16px; }
    #topbar { padding: 14px 16px; }
