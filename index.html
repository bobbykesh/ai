<html lang="en">

<title>NexusAI &mdash; Multi-Model Chat</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07090d;
    --surface:   #0e1219;
    --surface2:  #141b25;
    --border:    rgba(0, 220, 200, 0.12);
    --border2:   rgba(0, 220, 200, 0.06);
    --teal:      #00dcc8;
    --teal-dim:  rgba(0, 220, 200, 0.18);
    --teal-glow: rgba(0, 220, 200, 0.06);
    --amber:     #f0a040;
    --red:       #e05555;
    --green:     #50d890;
    --text:      #dde8f4;
    --muted:     #5a7090;
    --muted2:    #3a4f65;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'Fraunces', Georgia, serif;
    --sidebar-w: 300px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

  #app {
    display: flex; height: 100vh; overflow: hidden; position: relative;
  }
  #app::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(0,220,200,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 85% 80%, rgba(240,160,64,0.03) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* \u2500\u2500 SIDEBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 10; position: relative;
  }

  .sidebar-header { padding: 22px 18px 16px; border-bottom: 1px solid var(--border2); }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }

  .logo-mark {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--teal) 0%, #0090a0 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-weight: 800; font-size: 16px;
    color: #07090d; box-shadow: 0 0 20px rgba(0,220,200,0.3);
  }

  .logo-text { font-family: var(--font-head); font-weight: 700; font-size: 18px; color: var(--text); }
  .logo-text span { color: var(--teal); }

  .model-label {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }

  .search-wrap { position: relative; }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    opacity: 0.35; pointer-events: none; display: flex;
  }

  #model-search {
    width: 100%; padding: 8px 12px 8px 34px;
    background: var(--surface2);
    border: 1px solid var(--border); border-radius: 9px;
    color: var(--text); font-family: var(--font-mono); font-size: 12px;
    outline: none; transition: border-color 0.2s;
  }
  #model-search:focus { border-color: var(--teal); }
  #model-search::placeholder { color: var(--muted2); }

  .filter-tabs {
    display: flex; gap: 6px;
    padding: 10px 18px; border-bottom: 1px solid var(--border2);
  }

  .filter-tab {
    flex: 1; padding: 6px 0; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: var(--font-mono);
    font-size: 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
  }
  .filter-tab.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
  .filter-tab:hover:not(.active) { border-color: var(--muted2); color: var(--text); }

  #model-list {
    flex: 1; overflow-y: auto; padding: 8px;
    scrollbar-width: thin; scrollbar-color: var(--muted2) transparent;
  }

  .model-group-label {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted2); padding: 10px 10px 6px;
  }

  .model-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 10px; border-radius: 9px; cursor: pointer;
    transition: all 0.15s; margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .model-item:hover { background: var(--teal-glow); border-color: var(--border); }
  .model-item.selected { background: var(--teal-dim); border-color: var(--teal); }

  .model-item-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; background: var(--surface2); flex-shrink: 0;
    font-family: var(--font-mono); font-weight: 700; color: var(--teal);
    font-size: 11px; letter-spacing: 0; margin-top: 1px;
  }

  .model-item-info { flex: 1; min-width: 0; }

  .model-item-name {
    font-family: var(--font-mono); font-size: 11.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
  }
  .model-item.selected .model-item-name { color: var(--teal); }

  .model-item-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
